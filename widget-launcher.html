<!--
  JOHNNY AI WIDGET LAUNCHER
  Paste this into a Squarespace "Code Block" or Code Injection (Footer).
  1. Set Mode to "HTML"
  2. Turn OFF "Display Source"

  This adds a floating "Talk to Johnny" button.
  When clicked, it opens the AI widget in a full-screen overlay.
-->

<style>
  /* ── Floating Launch Button ── */
  #johnny-launcher-btn {
    position: fixed;
    bottom: 28px;
    right: 28px;
    z-index: 999999;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 24px;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    color: #fbbf24;
    border: 2px solid rgba(251, 191, 36, 0.4);
    border-radius: 50px;
    cursor: pointer;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.5px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 20px rgba(251, 191, 36, 0.15);
    transition: all 0.3s ease;
    text-transform: uppercase;
  }
  #johnny-launcher-btn:hover {
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5), 0 0 30px rgba(251, 191, 36, 0.25);
    border-color: rgba(251, 191, 36, 0.7);
  }
  #johnny-launcher-btn .johnny-pulse {
    width: 12px;
    height: 12px;
    background: #fbbf24;
    border-radius: 50%;
    animation: johnny-pulse-anim 2s ease-in-out infinite;
  }
  @keyframes johnny-pulse-anim {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  /* ── Overlay ── */
  #johnny-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9999999;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    animation: johnny-fade-in 0.3s ease;
  }
  #johnny-overlay.active { display: flex; align-items: center; justify-content: center; }
  @keyframes johnny-fade-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* ── Close Button ── */
  #johnny-close-btn {
    position: absolute;
    top: 16px;
    right: 20px;
    z-index: 10000000;
    width: 44px;
    height: 44px;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 50%;
    color: #fff;
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    font-family: system-ui, sans-serif;
  }
  #johnny-close-btn:hover {
    background: rgba(255, 255, 255, 0.2);
    transform: scale(1.1);
  }

  /* ── IFrame ── */
  #johnny-widget-frame {
    width: 100%;
    max-width: 460px;
    height: 90vh;
    max-height: 820px;
    border: none;
    border-radius: 20px;
    box-shadow: 0 25px 80px rgba(0, 0, 0, 0.6);
  }

  /* Mobile: go full screen */
  @media (max-width: 600px) {
    #johnny-widget-frame {
      max-width: 100%;
      width: 100%;
      height: 100%;
      max-height: 100%;
      border-radius: 0;
    }
    #johnny-close-btn {
      top: 8px;
      right: 12px;
    }
  }
</style>

<!-- Floating Button -->
<div id="johnny-launcher-btn" onclick="openJohnnyWidget()">
  <span class="johnny-pulse"></span>
  Talk to Johnny
</div>

<!-- Overlay (hidden by default) -->
<div id="johnny-overlay">
  <button id="johnny-close-btn" onclick="closeJohnnyWidget()" title="Close">&times;</button>
  <iframe
    id="johnny-widget-frame"
    src="https://johnny-chat.onrender.com/voice-widget.html"
    allow="microphone; autoplay"
    loading="lazy"
  ></iframe>
</div>

<script>
  function openJohnnyWidget() {
    document.getElementById('johnny-overlay').classList.add('active');
    document.body.style.overflow = 'hidden';
    // Hide the launcher button while widget is open
    document.getElementById('johnny-launcher-btn').style.display = 'none';
  }

  function closeJohnnyWidget() {
    document.getElementById('johnny-overlay').classList.remove('active');
    document.body.style.overflow = '';
    // Show the launcher button again
    document.getElementById('johnny-launcher-btn').style.display = 'flex';
  }

  // Also close on Escape key
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && document.getElementById('johnny-overlay').classList.contains('active')) {
      closeJohnnyWidget();
    }
  });
</script>
