<!--
  JOHNNY AI WIDGET LAUNCHER
  Paste this into a Squarespace "Code Block" or Code Injection (Footer).
  1. Set Mode to "HTML"
  2. Turn OFF "Display Source"

  This adds a floating "Talk to Johnny" button.
  When clicked, it opens the AI widget as a movable floating panel above the page.
-->

<style>
  /* ── Floating Launch Button ── */
  #johnny-launcher-btn {
    position: fixed;
    bottom: 28px;
    right: 28px;
    z-index: 10000001;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 24px;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    color: #fbbf24;
    border: 2px solid rgba(251, 191, 36, 0.4);
    border-radius: 50px;
    cursor: pointer;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.5px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 20px rgba(251, 191, 36, 0.15);
    transition: all 0.3s ease;
    text-transform: uppercase;
    overflow: hidden;
  }
  #johnny-launcher-btn:hover {
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5), 0 0 30px rgba(251, 191, 36, 0.25);
    border-color: rgba(251, 191, 36, 0.7);
  }
  #johnny-launcher-btn .johnny-pulse {
    width: 12px;
    height: 12px;
    background: #fbbf24;
    border-radius: 50%;
    animation: johnny-pulse-anim 2s ease-in-out infinite;
  }
  @keyframes johnny-pulse-anim {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  /* ── Floating Widget Panel ── */
  #johnny-widget-shell {
    position: fixed;
    right: 28px;
    bottom: 28px;
    width: min(420px, calc(100vw - 24px));
    height: min(760px, calc(100vh - 24px));
    z-index: 9999999;
    display: flex;
    flex-direction: column;
    border-radius: 24px;
    overflow: hidden;
    background: linear-gradient(180deg, rgba(17, 25, 20, 0.98), rgba(8, 12, 10, 0.98));
    border: 1px solid rgba(255, 255, 255, 0.12);
    box-shadow: 0 28px 90px rgba(0, 0, 0, 0.44);
    opacity: 0;
    visibility: hidden;
    transform: translateY(12px) scale(0.98);
    pointer-events: none;
    transition: opacity 0.22s ease, transform 0.22s ease, visibility 0.22s ease;
  }

  #johnny-widget-shell.active {
    opacity: 1;
    visibility: visible;
    transform: translateY(0) scale(1);
    pointer-events: auto;
  }

  #johnny-widget-shell.dragging {
    transition: none;
    user-select: none;
  }

  #johnny-widget-header {
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px 0 14px;
    background: linear-gradient(180deg, rgba(22, 31, 38, 0.98), rgba(10, 15, 18, 0.98));
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    cursor: grab;
    user-select: none;
  }

  #johnny-widget-header:active {
    cursor: grabbing;
  }

  #johnny-widget-title {
    display: flex;
    align-items: center;
    gap: 10px;
    color: #f3f4f6;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.2px;
  }

  #johnny-widget-title .johnny-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #22d3ee;
    box-shadow: 0 0 8px rgba(34, 211, 238, 0.9);
  }

  #johnny-header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #johnny-drag-hint {
    color: rgba(255, 255, 255, 0.44);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  #johnny-close-btn {
    width: 34px;
    height: 34px;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.14);
    border-radius: 999px;
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    font-family: system-ui, sans-serif;
  }

  #johnny-close-btn:hover {
    background: rgba(255, 255, 255, 0.18);
    transform: scale(1.06);
  }

  #johnny-widget-frame {
    width: 100%;
    flex: 1;
    min-height: 0;
    border: none;
    background: #0b1110;
  }

  /* ── Open State ── */
  #johnny-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9999998;
    pointer-events: none;
    background: transparent;
  }

  #johnny-overlay.active {
    display: block;
  }

  body.johnny-widget-open {
    overflow: auto;
  }

  body.johnny-widget-open #johnny-launcher-btn {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
    transform: translateY(0) scale(1);
    width: 52px;
    height: 52px;
    min-height: 52px;
    padding: 0;
    border-radius: 999px;
    gap: 0;
    right: 16px;
    bottom: 16px;
    justify-content: center;
    box-shadow: 0 8px 26px rgba(0, 0, 0, 0.36), 0 0 18px rgba(251, 191, 36, 0.12);
  }

  body.johnny-widget-open #johnny-launcher-btn .johnny-launcher-text {
    display: none;
  }

  body.johnny-widget-open #johnny-launcher-btn .johnny-pulse {
    width: 10px;
    height: 10px;
  }

  @media (max-width: 600px) {
    #johnny-widget-shell {
      right: 8px;
      bottom: 8px;
      width: 100%;
      height: calc(100vh - 16px);
      border-radius: 20px;
    }

    body.johnny-widget-open #johnny-launcher-btn {
      right: 10px;
      bottom: 10px;
      width: 42px;
      height: 42px;
      min-height: 42px;
    }

    body.johnny-widget-open #johnny-launcher-btn .johnny-pulse {
      width: 8px;
      height: 8px;
    }
  }
</style>

<!-- Floating Button -->
<div id="johnny-launcher-btn" onclick="openJohnnyWidget()">
  <span class="johnny-pulse"></span>
  <span class="johnny-launcher-text">Talk to Johnny</span>
</div>

<div id="johnny-overlay">
  <div id="johnny-widget-shell" aria-hidden="true">
    <div id="johnny-widget-header">
      <div id="johnny-widget-title">
        <span class="johnny-dot"></span>
        <span>Talk to Johnny</span>
      </div>
      <div id="johnny-header-actions">
        <span id="johnny-drag-hint">Drag</span>
        <button id="johnny-close-btn" onclick="closeJohnnyWidget()" title="Close">&times;</button>
      </div>
    </div>
    <iframe
      id="johnny-widget-frame"
      src="https://justaskjohnny.com/widget"
      allow="microphone; autoplay"
      loading="lazy"
    ></iframe>
  </div>
</div>

<script>
  (function () {
    const shell = document.getElementById('johnny-widget-shell');
    const launcher = document.getElementById('johnny-launcher-btn');
    const overlay = document.getElementById('johnny-overlay');
    const header = document.getElementById('johnny-widget-header');
    const isMobile = () => window.innerWidth <= 600;

    function positionShellDefault() {
      if (!shell) return;
      if (isMobile()) {
        shell.style.left = '8px';
        shell.style.top = '8px';
        shell.style.right = '8px';
        shell.style.bottom = '8px';
        shell.style.width = 'calc(100vw - 16px)';
        shell.style.height = 'calc(100vh - 16px)';
      } else {
        shell.style.left = 'auto';
        shell.style.top = 'auto';
        shell.style.right = '28px';
        shell.style.bottom = '28px';
        shell.style.width = 'min(420px, calc(100vw - 24px))';
        shell.style.height = 'min(760px, calc(100vh - 24px))';
      }
    }

    function openJohnnyWidget() {
      if (shell.classList.contains('active')) {
        closeJohnnyWidget();
        return;
      }
      positionShellDefault();
      overlay.classList.add('active');
      shell.classList.add('active');
      shell.setAttribute('aria-hidden', 'false');
      document.body.classList.add('johnny-widget-open');
    }

    function closeJohnnyWidget() {
      shell.classList.remove('active');
      overlay.classList.remove('active');
      shell.setAttribute('aria-hidden', 'true');
      document.body.classList.remove('johnny-widget-open');
    }

    function handleDocumentClick(event) {
      const openTrigger = event.target.closest('[data-johnny-open-widget]');
      if (openTrigger) {
        event.preventDefault();
        openJohnnyWidget();
        return;
      }

      const closeTrigger = event.target.closest('[data-johnny-close-widget]');
      if (closeTrigger) {
        event.preventDefault();
        closeJohnnyWidget();
      }
    }

    let drag = null;
    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function stopDrag() {
      if (!drag) return;
      shell.classList.remove('dragging');
      drag = null;
      window.removeEventListener('pointermove', onDragMove);
      window.removeEventListener('pointerup', stopDrag);
    }

    function onDragMove(event) {
      if (!drag || isMobile()) return;
      const width = shell.offsetWidth;
      const height = shell.offsetHeight;
      const nextLeft = clamp(drag.startLeft + (event.clientX - drag.startX), 8, window.innerWidth - width - 8);
      const nextTop = clamp(drag.startTop + (event.clientY - drag.startY), 8, window.innerHeight - height - 8);
      shell.style.left = `${nextLeft}px`;
      shell.style.top = `${nextTop}px`;
      shell.style.right = 'auto';
      shell.style.bottom = 'auto';
    }

    if (header) {
      header.addEventListener('pointerdown', function (event) {
        if (isMobile()) return;
        if (event.target.closest('#johnny-close-btn')) return;

        const rect = shell.getBoundingClientRect();
        drag = {
          startX: event.clientX,
          startY: event.clientY,
          startLeft: rect.left,
          startTop: rect.top
        };
        shell.classList.add('dragging');
        shell.style.left = `${rect.left}px`;
        shell.style.top = `${rect.top}px`;
        shell.style.right = 'auto';
        shell.style.bottom = 'auto';
        header.setPointerCapture?.(event.pointerId);
        window.addEventListener('pointermove', onDragMove);
        window.addEventListener('pointerup', stopDrag, { once: true });
      });
    }

    if (launcher) {
      launcher.addEventListener('keydown', function (event) {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          openJohnnyWidget();
        }
      });
    }

    document.addEventListener('click', handleDocumentClick);

    window.openJohnnyWidget = openJohnnyWidget;
    window.closeJohnnyWidget = closeJohnnyWidget;

    window.addEventListener('resize', function () {
      if (shell.classList.contains('active')) {
        positionShellDefault();
      }
    });

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && shell.classList.contains('active')) {
        closeJohnnyWidget();
      }
    });
  })();
</script>
