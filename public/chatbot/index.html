<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GPT 5.5</title>
  <meta name="description" content="A private JohnnyChat workspace.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/chatbot/chatbot.css?v=20260430-1">
  <script defer src="/chatbot/chatbot.js?v=20260430-1"></script>
</head>
<body>
  <div class="app-shell">
    <aside class="rail">
      <div class="rail-top">
        <div>
          <div class="brand">JohnnyChat</div>
          <div class="rail-subtitle">Private GPT 5.5</div>
        </div>
        <button id="new-chat-rail" class="pill-button" type="button">New chat</button>
      </div>

      <label class="search">
        <span class="sr-only">Search conversations</span>
        <input id="search" type="search" placeholder="Search conversations" autocomplete="off">
      </label>

      <section class="rail-card grow">
        <div class="card-head">
          <div>
            <h2>Chats</h2>
          </div>
          <button id="clear-search" class="pill-button pill-muted" type="button">Clear</button>
        </div>
        <div class="conversation-list" id="conversation-list"></div>
      </section>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="headline">
          <h1>JohnnyChat</h1>
          <p>Private GPT 5.5 workspace</p>
        </div>
        <div class="topbar-actions">
          <button id="voice-toggle" class="pill-button pill-muted voice-toggle" type="button" aria-pressed="false" title="Toggle AI-generated voice">AI voice off</button>
          <button id="new-chat-main" class="pill-button" type="button">New chat</button>
        </div>
      </header>

      <section class="chat-shell">
        <div class="messages" id="messages" aria-live="polite"></div>
        <div class="attachment-preview" id="attachment-preview"></div>

        <div class="composer">
          <button id="attach-btn" class="icon-button" type="button" title="Attach files">📎</button>
          <textarea id="input" rows="1" placeholder="Ask something or drop in a file..."></textarea>
          <button id="send-btn" class="send-button" type="button">Send</button>
          <input id="file-input" type="file" multiple accept=".pdf,image/png,image/jpeg,image/webp" hidden>
        </div>

      </section>
    </main>
  </div>

  <div class="modal" id="modal" aria-hidden="true">
    <button class="modal-close" id="close-modal" type="button" aria-label="Close preview">×</button>
    <img id="modal-image" alt="">
  </div>

  <span class="sr-only">Standalone GPT 5.5 chat page.</span>
</body>
</html>
