<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GPT 5.5</title>
  <meta name="description" content="A private JohnnyChat workspace.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./chatbot.css?v=20260430-4">
  <script defer src="./chatbot.js?v=20260506-1"></script>
</head>
<body>
  <div class="app-shell">
    <aside class="rail">
      <div class="rail-top">
        <div>
          <div class="brand">JohnnyChat</div>
          <div class="rail-subtitle">Private GPT 5.5</div>
        </div>
        <button id="new-chat-rail" class="pill-button" type="button">New chat</button>
      </div>

      <label class="search">
        <span class="sr-only">Search conversations</span>
        <input id="search" type="search" placeholder="Search conversations" autocomplete="off">
      </label>

      <section class="rail-card project-card">
        <div class="card-head">
          <div>
            <h2>Project</h2>
          </div>
          <button id="new-project" class="pill-button pill-muted" type="button">New</button>
        </div>
        <select id="project-select" class="project-select" aria-label="Project workspace"></select>
        <textarea id="project-notes" class="project-notes" rows="3" placeholder="Project notes..."></textarea>
      </section>

      <section class="rail-card workspace-card">
        <div class="card-head">
          <div>
            <h2>Files</h2>
          </div>
          <button id="clear-workspace" class="pill-button pill-muted" type="button">Clear</button>
        </div>
        <div class="workspace-files" id="workspace-files"></div>
      </section>

      <section class="rail-card library-card">
        <div class="card-head">
          <div>
            <h2>Library</h2>
          </div>
          <button id="add-knowledge" class="pill-button pill-muted" type="button">Add</button>
        </div>
        <input id="library-search" class="library-search" type="search" placeholder="Search saved knowledge" autocomplete="off">
        <div class="library-list" id="library-list"></div>
      </section>

      <section class="rail-card grow">
        <div class="card-head">
          <div>
            <h2>Chats</h2>
          </div>
          <button id="clear-search" class="pill-button pill-muted" type="button" title="Clear all chats in this project">Clear</button>
        </div>
        <div class="conversation-list" id="conversation-list"></div>
      </section>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="headline">
          <h1>JohnnyChat</h1>
          <p>Private GPT 5.5 workspace</p>
        </div>
        <div class="topbar-actions">
          <label class="voice-select-wrap">
            <span>Voice</span>
            <select id="voice-select" aria-label="AI voice">
              <option value="alloy">Alloy</option>
              <option value="ash">Ash</option>
              <option value="ballad">Ballad</option>
              <option value="cedar" selected>Cedar</option>
              <option value="coral">Coral</option>
              <option value="echo">Echo</option>
              <option value="fable">Fable</option>
              <option value="marin">Marin</option>
              <option value="nova">Nova</option>
              <option value="onyx">Onyx</option>
              <option value="sage">Sage</option>
              <option value="shimmer">Shimmer</option>
              <option value="verse">Verse</option>
            </select>
          </label>
          <button id="voice-toggle" class="pill-button pill-muted voice-toggle" type="button" aria-pressed="false" title="Toggle AI-generated voice">AI voice off</button>
          <button id="research-toggle" class="pill-button pill-muted" type="button" aria-pressed="false">Research</button>
          <button id="actions-toggle" class="pill-button pill-muted" type="button">Actions</button>
          <button id="stats-toggle" class="pill-button pill-muted" type="button">Stats</button>
          <button id="new-chat-main" class="pill-button" type="button">New chat</button>
        </div>
      </header>

      <section class="chat-shell">
        <div class="messages" id="messages" aria-live="polite"></div>
        <div class="attachment-preview" id="attachment-preview"></div>

        <div class="composer">
          <button id="attach-btn" class="icon-button" type="button" title="Attach files">📎</button>
          <button id="mic-btn" class="icon-button mic-button" type="button" title="Record voice">🎙</button>
          <textarea id="input" rows="1" placeholder="Ask something or drop in a file..."></textarea>
          <button id="send-btn" class="send-button" type="button">Send</button>
          <input id="file-input" type="file" multiple accept=".pdf,image/png,image/jpeg,image/webp" hidden>
        </div>

      </section>
    </main>
  </div>

  <div class="modal" id="modal" aria-hidden="true">
    <button class="modal-close" id="close-modal" type="button" aria-label="Close preview">×</button>
    <img id="modal-image" alt="">
  </div>

  <aside class="stats-panel" id="stats-panel" aria-hidden="true">
    <div class="stats-panel-head">
      <div>
        <h2>Usage</h2>
        <p>Private chatbot activity</p>
      </div>
      <button id="close-stats" class="modal-close" type="button" aria-label="Close usage panel">×</button>
    </div>
    <div class="stats-body" id="stats-body"></div>
    <button id="refresh-stats" class="pill-button" type="button">Refresh</button>
  </aside>

  <aside class="actions-panel" id="actions-panel" aria-hidden="true">
    <div class="stats-panel-head">
      <div>
        <h2>Actions</h2>
        <p>Turn this chat into work</p>
      </div>
      <button id="close-actions" class="modal-close" type="button" aria-label="Close actions panel">×</button>
    </div>
    <div class="action-grid">
      <button type="button" data-command="summary">Summarize chat</button>
      <button type="button" data-command="tasks">Make task list</button>
      <button type="button" data-command="quote">Draft quote</button>
      <button type="button" data-command="email">Draft email</button>
      <button type="button" data-command="website">Website copy</button>
      <button type="button" data-command="library">Save to library</button>
      <button type="button" data-command="markdown">Export Markdown</button>
      <button type="button" data-command="html">Export HTML</button>
    </div>
  </aside>

  <span class="sr-only">Standalone GPT 5.5 chat page.</span>
</body>
</html>
